<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.8);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.6);stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blue-glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,113,227,0.9);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(0,113,227,0.7);stop-opacity:1"/>
    </linearGradient>
  </defs>

  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      font-weight: 500;
    }
    .title { font-size: 24px; font-weight: 600; fill: #1d1d1f; }
    .label { font-size: 13px; fill: #1d1d1f; }
    .sub { font-size: 10px; fill: #86868b; }
    .node { fill: url(#glass); stroke: rgba(0,0,0,0.1); stroke-width: 1.5; rx: 12; }
    .center { fill: url(#blue-glass); rx: 16; }
    .arrow { stroke: #d2d2d7; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .flow { stroke: #0071e3; stroke-width: 2; fill: none; marker-end: url(#bluearrow); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d2d2d7"/>
    </marker>
    <marker id="bluearrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0071e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f7"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">nuLLM Architecture</text>

  <!-- Input Layer -->
  <rect class="node" x="50" y="100" width="140" height="60"/>
  <text x="120" y="125" text-anchor="middle" class="label">Input Text</text>
  <text x="120" y="142" text-anchor="middle" class="sub">"hello world"</text>

  <!-- Tokenizer -->
  <rect class="node" x="50" y="200" width="140" height="70"/>
  <text x="120" y="228" text-anchor="middle" class="label">Tokenizer</text>
  <text x="120" y="243" text-anchor="middle" class="sub">Char / Word / BPE</text>
  <text x="120" y="258" text-anchor="middle" class="sub">text → token IDs</text>
  <path class="flow" d="M 120 160 L 120 200"/>

  <!-- Embeddings -->
  <rect class="node" x="50" y="310" width="140" height="70"/>
  <text x="120" y="338" text-anchor="middle" class="label">Embeddings</text>
  <text x="120" y="353" text-anchor="middle" class="sub">Token + Position</text>
  <text x="120" y="368" text-anchor="middle" class="sub">IDs → vectors</text>
  <path class="flow" d="M 120 270 L 120 310"/>

  <!-- Transformer Stack (Center) -->
  <rect class="center" x="280" y="200" width="240" height="280"/>
  <text x="400" y="230" text-anchor="middle" fill="white" class="label" style="font-size: 16px; font-weight: 600;">Transformer Stack</text>

  <!-- Multi-Head Attention -->
  <rect class="node" x="300" y="250" width="200" height="70"/>
  <text x="400" y="278" text-anchor="middle" class="label">Multi-Head Attention</text>
  <text x="400" y="293" text-anchor="middle" class="sub">Q, K, V projections</text>
  <text x="400" y="308" text-anchor="middle" class="sub">Scaled dot-product</text>

  <!-- Feed Forward -->
  <rect class="node" x="300" y="340" width="200" height="60"/>
  <text x="400" y="365" text-anchor="middle" class="label">Feed Forward Network</text>
  <text x="400" y="382" text-anchor="middle" class="sub">Linear → GELU → Linear</text>

  <!-- Layer Norm + Residuals -->
  <rect class="node" x="300" y="420" width="200" height="50"/>
  <text x="400" y="442" text-anchor="middle" class="label">LayerNorm + Residuals</text>
  <text x="400" y="457" text-anchor="middle" class="sub">x = x + f(x)</text>

  <!-- Output Projection -->
  <rect class="node" x="610" y="310" width="140" height="70"/>
  <text x="680" y="338" text-anchor="middle" class="label">Output Projection</text>
  <text x="680" y="353" text-anchor="middle" class="sub">vectors → logits</text>
  <text x="680" y="368" text-anchor="middle" class="sub">vocab size</text>
  <path class="flow" d="M 520 340 L 610 345"/>

  <!-- Sampling -->
  <rect class="node" x="610" y="200" width="140" height="70"/>
  <text x="680" y="228" text-anchor="middle" class="label">Sampling</text>
  <text x="680" y="243" text-anchor="middle" class="sub">Temperature</text>
  <text x="680" y="258" text-anchor="middle" class="sub">Top-k / Nucleus</text>
  <path class="flow" d="M 680 310 L 680 270"/>

  <!-- Generated Token -->
  <rect class="node" x="610" y="100" width="140" height="60"/>
  <text x="680" y="125" text-anchor="middle" class="label">Next Token</text>
  <text x="680" y="142" text-anchor="middle" class="sub">Autoregressive</text>
  <path class="flow" d="M 680 200 L 680 160"/>

  <!-- Flow arrows -->
  <path class="flow" d="M 190 345 L 280 290"/>

  <!-- Training Loop (Bottom) -->
  <g opacity="0.7">
    <rect class="node" x="50" y="500" width="140" height="60"/>
    <text x="120" y="525" text-anchor="middle" class="label">Training Data</text>
    <text x="120" y="542" text-anchor="middle" class="sub">WikiText / Shakespeare</text>

    <rect class="node" x="250" y="500" width="140" height="60"/>
    <text x="320" y="525" text-anchor="middle" class="label">Loss Function</text>
    <text x="320" y="542" text-anchor="middle" class="sub">Cross-Entropy</text>

    <rect class="node" x="450" y="500" width="140" height="60"/>
    <text x="520" y="525" text-anchor="middle" class="label">Optimizer</text>
    <text x="520" y="542" text-anchor="middle" class="sub">Adam</text>

    <rect class="node" x="610" y="500" width="140" height="60"/>
    <text x="680" y="525" text-anchor="middle" class="label">Backprop</text>
    <text x="680" y="542" text-anchor="middle" class="sub">Update Weights</text>

    <path class="arrow" d="M 190 530 L 250 530"/>
    <path class="arrow" d="M 390 530 L 450 530"/>
    <path class="arrow" d="M 590 530 L 610 530"/>
  </g>

  <!-- Model Stats -->
  <rect class="node" x="50" y="420" width="140" height="60"/>
  <text x="120" y="438" text-anchor="middle" class="sub" style="font-size: 9px;">Nano: 50K params</text>
  <text x="120" y="452" text-anchor="middle" class="sub" style="font-size: 9px;">Micro: 500K params</text>
  <text x="120" y="466" text-anchor="middle" class="sub" style="font-size: 9px;">Mini: 5M params</text>

</svg>
