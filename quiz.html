<!DOCTYPE html>
<html>
<head>
    <title>nuLLM Quiz - Model Testing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.1em;
        }
        .quiz-status {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .status-label {
            font-weight: 600;
            color: #333;
        }
        .status-value {
            color: #000;
            font-weight: 600;
        }
        .question {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .question.active {
            display: block;
        }
        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        .model-answer {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #333;
            margin-bottom: 15px;
            font-family: 'Monaco', 'Courier New', monospace;
            min-height: 60px;
            display: flex;
            align-items: center;
        }
        .model-answer.loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .result {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 10px;
        }
        .result.pass {
            background: #d4edda;
            color: #155724;
        }
        .result.fail {
            background: #f8d7da;
            color: #721c24;
        }
        .begin-btn, .next-btn {
            background: #333;
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .begin-btn:hover, .next-btn:hover {
            background: #000;
            transform: translateY(-1px);
        }
        .begin-btn:active, .next-btn:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .final-score {
            text-align: center;
            display: none;
        }
        .final-score.show {
            display: block;
        }
        .score-display {
            font-size: 4em;
            font-weight: 700;
            color: #333;
            margin: 20px 0;
        }
        .score-message {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
        }
        .hidden {
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #333;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 nuLLM Quiz</h1>
        <p class="subtitle">Test your model's knowledge</p>
        
        <div class="progress-bar hidden" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="quiz-status">
            <div class="status-row">
                <span class="status-label">Model:</span>
                <span class="status-value">models/ultra.pt</span>
            </div>
            <div class="status-row">
                <span class="status-label">Questions:</span>
                <span class="status-value" id="totalQuestions">3</span>
            </div>
            <div class="status-row">
                <span class="status-label">Score:</span>
                <span class="status-value" id="scoreDisplay">0 / 0</span>
            </div>
        </div>

        <div id="startScreen">
            <p style="text-align: center; color: #666; margin-bottom: 20px;">
                Ready to test nuLLM? Click below to begin the quiz.
            </p>
            <button class="begin-btn" onclick="startQuiz()">Begin Quiz</button>
        </div>

        <div id="quizScreen" class="hidden">
            <div class="question active" id="q1">
                <div class="question-text">Q: What is your name?</div>
                <div class="model-answer" id="a1"></div>
                <div id="result1"></div>
            </div>

            <div class="question" id="q2">
                <div class="question-text">Q: What is 5+5?</div>
                <div class="model-answer" id="a2"></div>
                <div id="result2"></div>
            </div>

            <div class="question" id="q3">
                <div class="question-text">Q: What is 2+2?</div>
                <div class="model-answer" id="a3"></div>
                <div id="result3"></div>
            </div>

            <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">Next Question</button>
        </div>

        <div id="finalScore" class="final-score">
            <div class="score-display" id="finalScoreNum"></div>
            <div class="score-message" id="finalMessage"></div>
            <button class="begin-btn" onclick="location.reload()">Retake Quiz</button>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let score = 0;
        const questions = [
            { q: "Q: What is your name?\nA:", expected: "I'm nuLLM", answerId: "a1", resultId: "result1" },
            { q: "Q: What is 5+5?\nA:", expected: "10", answerId: "a2", resultId: "result2" },
            { q: "Q: What is 2+2?\nA:", expected: "4", answerId: "a3", resultId: "result3" }
        ];

        function startQuiz() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('progressBar').classList.remove('hidden');
            askQuestion(0);
        }

        async function askQuestion(index) {
            if (index >= questions.length) {
                showFinalScore();
                return;
            }

            currentQuestion = index;
            updateProgress();

            // Show current question
            document.querySelectorAll('.question').forEach((q, i) => {
                q.classList.toggle('active', i === index);
            });

            const question = questions[index];
            const answerEl = document.getElementById(question.answerId);
            const resultEl = document.getElementById(question.resultId);
            
            answerEl.textContent = 'Asking model';
            answerEl.classList.add('loading');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: question.q,
                        length: 50,
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                answerEl.classList.remove('loading');

                if (data.error) {
                    answerEl.textContent = 'Error: ' + data.error;
                    resultEl.innerHTML = '<span class="result fail">❌ FAIL</span>';
                } else {
                    // Extract answer after "A:"
                    let answer = data.text;
                    if (answer.includes('A:')) {
                        answer = answer.split('A:')[1].split('\n')[0].trim();
                    }
                    answerEl.textContent = answer;

                    // Check if correct
                    const isCorrect = answer.toLowerCase().includes(question.expected.toLowerCase()) || 
                                      answer === question.expected;
                    
                    if (isCorrect) {
                        score++;
                        resultEl.innerHTML = '<span class="result pass">✅ PASS</span>';
                    } else {
                        resultEl.innerHTML = `<span class="result fail">❌ FAIL</span> <small>(Expected: ${question.expected})</small>`;
                    }

                    updateScore();
                }
            } catch (error) {
                answerEl.classList.remove('loading');
                answerEl.textContent = 'Network error';
                resultEl.innerHTML = '<span class="result fail">❌ ERROR</span>';
            }

            // Show next button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('hidden');
            nextBtn.textContent = (index === questions.length - 1) ? 'View Results' : 'Next Question';
        }

        function nextQuestion() {
            document.getElementById('nextBtn').classList.add('hidden');
            askQuestion(currentQuestion + 1);
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = `${score} / ${currentQuestion + 1}`;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showFinalScore() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('finalScore').classList.add('show');
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('finalScoreNum').textContent = `${score}/${questions.length}`;
            
            let message = '';
            if (percentage === 100) {
                message = '🎉 Perfect! Your model is working great!';
            } else if (percentage >= 67) {
                message = '👍 Good job! Most questions passed.';
            } else if (percentage >= 33) {
                message = '⚠️ Needs work. Try more training.';
            } else {
                message = '❌ Model needs significant improvement.';
            }
            
            document.getElementById('finalMessage').textContent = message;
        }
    </script>
</body>
</html>
